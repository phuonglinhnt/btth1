  <h3>
    <p>
      Trăng lên đầu núi lưng sông,<br />
      Dòng sông lặng chảy bên đồi cỏ xanh.<br />
      Gió khuya khe khẽ qua mành,<br />
      Mang theo hương lúa ngọt lành quê hương.<br /><br />
